name: Build, Package & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────
  # Master push - 校验编译 + 存快照
  # ────────────────────────────
  build-check:
    if: github.ref_type == 'branch' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle
      - name: Build JAR
        run: ./gradlew bootJar
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-jar
          path: build/**/*.jar
          retention-days: 7

  # ────────────────────────────
  # Tag push - 构建正式 JAR
  # ────────────────────────────
  build-jar:
    if: startsWith(github.ref_name, 'v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VER="${{ inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building TS3AudioBot v$VER"

      - name: Build JAR
        run: ./gradlew bootJar -Pversion=${{ steps.version.outputs.version }}

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: build/**/*.jar

  # ────────────────────────────
  # 多平台打包（并行）
  # ────────────────────────────
  package:
    needs: build-jar
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
            desc: Linux x86_64
            ffmpeg-url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
            ffmpeg-extract: |
              tar xf ffmpeg.tar.xz
              mv ffmpeg-master-*-linux64-gpl/bin/ffmpeg staging/ffmpeg/
              mv ffmpeg-master-*-linux64-gpl/bin/ffprobe staging/ffmpeg/
            yt-dlp-url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
            yt-name: yt-dlp

          - suffix: linux-arm64
            desc: Linux ARM64 (aarch64)
            ffmpeg-url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linuxarm64-gpl.tar.xz
            ffmpeg-extract: |
              tar xf ffmpeg.tar.xz
              mv ffmpeg-master-*-linuxarm64-gpl/bin/ffmpeg staging/ffmpeg/
              mv ffmpeg-master-*-linuxarm64-gpl/bin/ffprobe staging/ffmpeg/
            yt-dlp-url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
            yt-name: yt-dlp

          - suffix: win-x64
            desc: Windows x86_64
            ffmpeg-url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
            ffmpeg-extract: |
              7z x ffmpeg.zip -o/tmp/ffmpeg-x -y > /dev/null
              find /tmp/ffmpeg-x -type f \( -name ffmpeg.exe -o -name ffprobe.exe \) -exec cp {} staging/ffmpeg/ \;
            yt-dlp-url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            yt-name: yt-dlp.exe

          - suffix: macos
            desc: macOS Universal (Intel + Apple Silicon)
            ffmpeg-url: https://evermeet.cx/ffmpeg/ffmpeg-8.1.zip
            ffmpeg-extract: |
              unzip -j ffmpeg.zip -d staging/ffmpeg/
              curl -fsSL -o ffprobe.zip https://evermeet.cx/ffmpeg/ffprobe-8.1.zip
              unzip -j ffprobe.zip -d staging/ffmpeg/
              rm -f ffprobe.zip
            yt-dlp-url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
            yt-name: yt-dlp

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.run_id }} --name release-jar --dir .
          set +e
          unzip -o release-jar.zip 2>/dev/null || true
          set -e
          ls -la *.jar

      - name: Extract version
        id: version
        run: |
          VER=$(ls TS3AudioBot-*.jar | sed 's/TS3AudioBot-//;s/.jar//')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create staging directories
        run: |
          mkdir -p staging/ffmpeg
          mkdir -p "release/TS3AudioBot-${{ steps.version.outputs.version }}"

      - name: Download & extract FFmpeg
        run: |
          curl -fsSL -o ffmpeg.tar.xz "${{ matrix.ffmpeg-url }}" 2>/dev/null || curl -fsSL -o ffmpeg.zip "${{ matrix.ffmpeg-url }}"
          ${{ matrix.ffmpeg-extract }}
          chmod +x staging/ffmpeg/*

      - name: Download yt-dlp
        run: |
          curl -fsSL -o "staging/${{ matrix.yt-name }}" "${{ matrix.yt-dlp-url }}"
          chmod +x "staging/${{ matrix.yt-name }}"

      - name: Assemble package
        run: |
          V="${{ steps.version.outputs.version }}"
          PKG="release/TS3AudioBot-${V}"
          cp TS3AudioBot-*.jar   "${PKG}/TS3AudioBot-${V}.jar"
          cp -r staging/ffmpeg    "${PKG}/"
          cp staging/*-dlp*       "${PKG}/" 2>/dev/null || true
          cp ts3Audio-config.toml "${PKG}/"
          cp README*.md LICENSE NOTICE "${PKG}/" 2>/dev/null || true

      - name: Create ZIP
        run: |
          cd release
          zip -r9 "../TS3AudioBot-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.zip" TS3AudioBot-*/

      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.suffix }}
          path: TS3AudioBot-*-${{ matrix.suffix }}.zip

  # ────────────────────────────
  # 创建 GitHub Release
  # ────────────────────────────
  create-release:
    needs: [build-jar, package]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.run_id }} --dir artifacts
          find artifacts -type f -name '*.zip' -exec cp {} . \;
          find artifacts -type f -name '*.jar' -exec cp {} . \;
          ls -la *.zip *.jar 2>/dev/null || true

      - name: Generate release notes
        id: notes
        run: |
          V="${{ needs.build-jar.outputs.version }}"
          cat > release-notes.md <<EOF
          ## TS3AudioBot v${V}

          每个 ZIP 包含对应平台编译的 FFmpeg + yt-dlp + 配置模板

          ### 下载
          | 平台 | 架构 | 文件 |
          |------|------|------|
          | Linux | x86_64 | TS3AudioBot-${V}-linux-x64.zip |
          | Linux | ARM64 | TS3AudioBot-${V}-linux-arm64.zip |
          | Windows | x86_64 | TS3AudioBot-${V}-win-x64.zip |
          | macOS | Intel + Apple Silicon | TS3AudioBot-${V}-macos.zip |
          | 跨平台 | 裸 JAR | TS3AudioBot-${V}.jar |

          Docker: docker pull ghcr.io/${{ github.repository }}:v${V}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-jar.outputs.version }}
          name: TS3AudioBot v${{ needs.build-jar.outputs.version }}
          body_path: release-notes.md
          files: |
            *.zip
            TS3AudioBot-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────
  # Docker 镜像 → ghcr.io
  # ────────────────────────────
  docker:
    needs: build-jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.run_id }} --name release-jar --dir .
          mv TS3AudioBot-*.jar TS3AudioBot.jar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.build-jar.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
