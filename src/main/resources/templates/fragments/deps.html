<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 统一维护公共前端依赖：主 CDN + 回退 CDN，避免每个页面重复拷贝。 -->
<th:block th:fragment="head-base">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" href="/favicon.svg" />
    <link rel="stylesheet" th:href="@{/css/font-manrope.css}" href="/css/font-manrope.css" />
</th:block>

<!-- 播放页额外依赖：Font Awesome 图标库。 -->
<th:block th:fragment="head-player">
    <th:block th:replace="~{fragments/deps :: head-base}"></th:block>
</th:block>

<!-- 通用脚本依赖：jQuery + Bootstrap。 -->
<th:block th:fragment="scripts-base">
</th:block>

<!-- 带依赖检测横幅的脚本组合（首页/设置页）。 -->
<th:block th:fragment="scripts-banner">
    <th:block th:replace="~{fragments/deps :: scripts-base}"></th:block>
    <script th:src="@{/js/dependency-banner.js}" src="/js/dependency-banner.js"></script>
</th:block>

<!-- 播放页脚本组合：在通用依赖上额外引入二维码库。 -->
<th:block th:fragment="scripts-player">
    <th:block th:replace="~{fragments/deps :: scripts-base}"></th:block>
    <script th:src="@{/js/dependency-banner.js}" src="/js/dependency-banner.js"></script>
</th:block>
</body>
</html>
