<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 统一维护公共前端依赖：主 CDN + 回退 CDN，避免每个页面重复拷贝。 -->
<th:block th:fragment="head-base">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" href="/favicon.svg" />
    <link rel="stylesheet" th:href="@{/css/font-manrope.css}" href="/css/font-manrope.css" />
    <link rel="stylesheet" href="https://cdn.staticfile.net/twitter-bootstrap/5.3.3/css/bootstrap.min.css" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css';" />
</th:block>

<!-- 播放页额外依赖：Font Awesome 图标库。 -->
<th:block th:fragment="head-player">
    <th:block th:replace="~{fragments/deps :: head-base}"></th:block>
    <link rel="stylesheet" href="https://cdn.staticfile.net/font-awesome/6.4.0/css/all.min.css" onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';" />
</th:block>

<!-- 通用脚本依赖：jQuery + Bootstrap。 -->
<th:block th:fragment="scripts-base">
    <script src="https://cdn.staticfile.net/jquery/3.7.1/jquery.min.js" onerror="this.onerror=null;this.src='https://code.jquery.com/jquery-3.7.1.min.js';"></script>
    <script src="https://cdn.staticfile.net/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js';"></script>
</th:block>

<!-- 带依赖检测横幅的脚本组合（首页/设置页）。 -->
<th:block th:fragment="scripts-banner">
    <th:block th:replace="~{fragments/deps :: scripts-base}"></th:block>
    <script th:src="@{/js/dependency-banner.js}" src="/js/dependency-banner.js"></script>
</th:block>

<!-- 播放页脚本组合：在通用依赖上额外引入二维码库。 -->
<th:block th:fragment="scripts-player">
    <th:block th:replace="~{fragments/deps :: scripts-base}"></th:block>
    <script src="https://cdn.staticfile.net/qrious/4.0.2/qrious.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js';"></script>
    <script th:src="@{/js/dependency-banner.js}" src="/js/dependency-banner.js"></script>
</th:block>
</body>
</html>
