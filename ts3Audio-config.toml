# TS3AudioBot external config (minimal)

[configs]
db_path = "data/ts3audiobot.db"
bots_path = "bots"

[web]
port = 58913
hosts = ["*"]

[web.api]
enabled = false

[web.interface]
enabled = true

[tools]
auto_download = false

[paths]
ffmpeg = "ffmpeg"
yt = "yt-dlp"
ytmusic = "yt-dlp"
netease = "netease-cloud-music"
qq = "qqmusic"

[search]
auth_secret = "CHANGE_ME"
cache_seconds = 120

[media]
cache_enabled = true
audio_cache_enabled = true
max_size_gb = 20
cache_ttl_hours = 720

[media.image]
enabled = true
# mode 可选值：
# - "direct": 必须直链，仅使用源图片 URL，不走本地代理
# - "hybrid": 优先直链（推荐），直链失败自动回退本地代理
# - "proxy": 不直链，全部走本地代理与压缩图
mode = "direct"
thumb_size = 120
cover_size = 360
