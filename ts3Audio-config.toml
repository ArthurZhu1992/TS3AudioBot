# TS3AudioBot external config (minimal)

[configs]
db_path = "data/ts3audiobot.db"
bots_path = "bots"

[web]
port = 58913
hosts = ["*"]

[web.api]
enabled = false

[web.interface]
enabled = true

[tools]
auto_download = false

[paths]
ffmpeg = "ffmpeg"
yt = "yt-dlp"
ytmusic = "yt-dlp"
netease = "netease-cloud-music"
qq = "qqmusic"

[search]
auth_secret = "CHANGE_ME"
cache_seconds = 120

[media]
cache_enabled = true
audio_cache_enabled = true
max_size_gb = 20
cache_ttl_hours = 720
